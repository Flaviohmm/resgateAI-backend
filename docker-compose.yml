version: "3.9"

services:
  db:
    image: postgres:16
    container_name: resgate-db
    environment:
      POSTGRES_DB: resgate_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: .
    container_name: resgate-backend
    depends_on:
      - db
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/resgate_ai
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SPRING_FLYWAY_ENABLED: "true"

      # AI (opcional)
      ANTHROPIC_API_KEY: ""
      OPENAI_API_KEY: ""

volumes:
  pgdata:
