server:
  port: 8080

spring:
  application:
    name: resgate-ai-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/resgate_ai}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

ai:
  provider: ${AI_PROVIDER:anthropic}
  fallback-enabled: ${AI_FALLBACK_ENABLED:true}

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  model: ${ANTHROPIC_MODEL:claude-haiku-4-5}

openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-4o-mini}

ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  model: ${OLLAMA_MODEL:llama3.1}

telegram:
  bot-token: ${TELEGRAM_BOT_TOKEN:}
  chat-id: ${TELEGRAM_CHAT_ID:}
  base-url: ${TELEGRAM_BASE_URL:https://api.telegram.org}

app:
  cors:
    # Lista separada por vírgula. Em produção, defina CORS_ALLOWED_ORIGINS com a
    # URL pública do frontend (ex.: https://resgate-ai.vercel.app).
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
